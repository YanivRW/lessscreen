name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build debug APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      # Restore project keystore from secrets — same fingerprint locally & in CI.
      - name: Restore signing keystore
        run: |
          mkdir -p keystore
          echo "$KEYSTORE_B64" | base64 -d > keystore/lessscreen.jks
          cat > keystore.properties <<EOF
          storeFile=keystore/lessscreen.jks
          storePassword=$KEYSTORE_PASSWORD
          keyAlias=lessscreen
          keyPassword=$KEYSTORE_PASSWORD
          EOF
          echo "=== SHA-1 (must match Google Cloud OAuth Android client) ==="
          keytool -list -v \
            -keystore keystore/lessscreen.jks \
            -alias lessscreen \
            -storepass "$KEYSTORE_PASSWORD" 2>/dev/null | grep "SHA1:"
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}

      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version 8.9 --distribution-type bin

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: LessScreen-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
