name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build debug APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      # If KEYSTORE_BASE64 secret exists: restore stable keystore.
      # If not: generate one, print base64 + SHA-1 so you can save it as a secret.
      - name: Set up signing keystore
        run: |
          mkdir -p ~/.android
          if [ -n "$KEYSTORE_B64" ]; then
            echo "$KEYSTORE_B64" | base64 -d > ~/.android/debug.keystore
            echo "✅ Restored stable keystore from secret."
          else
            keytool -genkeypair -v \
              -keystore ~/.android/debug.keystore \
              -alias androiddebugkey \
              -keyalg RSA -keysize 2048 -validity 36500 \
              -storepass android -keypass android \
              -dname "CN=LessScreen Debug, O=LessScreen" 2>/dev/null
            echo ""
            echo "========================================================"
            echo "⚠️  FIRST RUN: new keystore generated."
            echo "Copy everything between the --- lines as the GitHub secret KEYSTORE_BASE64:"
            echo "---"
            base64 -w 0 ~/.android/debug.keystore
            echo ""
            echo "---"
            echo "========================================================"
          fi
          echo ""
          echo "=== SHA-1 to register in Google Cloud Console ==="
          keytool -list -v \
            -keystore ~/.android/debug.keystore \
            -alias androiddebugkey \
            -storepass android 2>/dev/null | grep "SHA1:"
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_BASE64 }}

      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version 8.9 --distribution-type bin

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: LessScreen-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
